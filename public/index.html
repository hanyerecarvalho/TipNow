<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TipNow</title>
    <href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"></href>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 5px;
            padding: 10px;
        }
        h1 {
            text-align: center;
            font-size: 40px;
            padding-bottom: 15px;
        }
        button {
            border-radius: 5px;
            font-size: 17px;
            color: rgb(24, 24, 24);
        }
        .content {
            text-align: center;
        }

    </style>
</head>


<body class="bg-light">
    <h1>TipNow</h1>

    <div class="container mt-5">
        <div class="card p-4">

            <div class="content">
                <form action="/calculo" method="post">

                    <p>Valor da conta:</p>
                    <div class="input-group">
                    <span>R$</span>
                    <input type="number" name="valor" placeholder="200.00" step="0.01">
                    </div>

                    <p>Gorjeta a pagar:</p>
                    <div class="input-group">
                    <input type="number" name="gorjeta" placeholder="5">
                    <span>%</span>
                    </div>

                    <p>Dividir por quantas pessoas:</p>
                    <div class="input-group">
                        <input type="number" name="qtdPessoas" placeholder="3">
                        <span>Pessoas</span>
                    </div>

                    <br>
                    <button type="submit">Calcular</button>
                </form>
            </div>

    </div>
        </div>
    
</body>
</html>
